<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Симуляция теплопроводности</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
<header id="simulation-header">
    <a class="main-page-link" href="index.html">
        <img src="../assets/logo.png" alt="Лого" class="logo">
    </a>
    <h1 class="simulation-title">Heat Equation</h1>
    <button class="simulation-settings-button" onclick="onClickMenuButton()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<div class="simulation-wrapper">
    <div class="container" id="simulation-content" style="display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000;">
        <canvas id="heatCanvas"></canvas>
    </div>

    <aside class="simulation-settings-panel container">
        <div class="field">
            <label for="paramA">Коэффициент a</label>
            <input type="number" id="paramA" min="0.1" max="10" step="0.1" value="1.0">
        </div>

        <div class="selector">
            <div class="selector-title">Управление</div>
            <div class="selector-buttons">
                <button id="clearBtn" type="button">Очистить</button>
                <button id="resetBtn" type="button" class="active">Точка в центр</button>
            </div>
        </div>

        <div class="info-box" style="margin-top: 20px; color: white; font-size: 14px;">
            <p><b>Задача Дирихле:</b> температура на границах зафиксирована: T=0</p>
            <p style="margin-top:10px;"><i>Зажмите мышь, чтобы рисовать тепло на поле</i></p>
        </div>
    </aside>
</div>
<script src="heat.js"></script>
</body>
</html>
