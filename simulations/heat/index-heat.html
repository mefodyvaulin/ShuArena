<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Heat</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../simulation.css">
    <link rel="stylesheet" href="styles-heat.css">
    <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="heat.js"></script>
    <script src="../simulation.js"></script>
</head>
<body>
<header id="simulation-header">
    <a class="main-page-link" href="../../main-page/index.html">
        <img src="../../assets/logo.png" alt="Лого" class="logo">
    </a>
    <h1 class="simulation-title">Heat Equation</h1>
    <button class="simulation-settings-button" onclick="onClickSimulationSettingsButton()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<div class="simulation-wrapper">
    <div class="container" id="simulation-content" style="display: flex; justify-content: center; align-items: center; overflow: hidden">
        <canvas id="heatCanvas"></canvas>
    </div>

    <aside class="simulation-settings-panel container">
        <div class="field">
            <label for="paramA">Коэффициент теплопроводности</label>
            <input type="number" id="paramA" min="0.1" max="10" step="0.1" value="1.0">
        </div>

        <div class="settings-buttons">
            <div class="settings-buttons-title">Управление</div>
            <div class="settings-buttons-container">
                <button id="clearBtn" type="button" class = "active">Очистить</button>
                <button id="resetBtn" type="button" class="active">Точка в центр</button>
            </div>
        </div>

        <div class="info-box">
            <p><b>Задача Дирихле:</b> температура на границах зафиксирована: T=0</p>
            <p style="margin-top:10px;"><i>Зажмите мышь, чтобы рисовать тепло на поле</i></p>
        </div>
    </aside>
</div>
</body>
</html>
