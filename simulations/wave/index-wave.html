<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wave</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/simulations/simulation.css">
    <link rel="stylesheet" href="/wave/wave-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="/simulations/simulation.js"></script>
    <script type="module" src="/wave/script.js"></script>
</head>
<body>
<header id = "simulation-header">
    <a class = "main-page-link" href = "/main-page/index.html">
        <img src = "/assets/logo.png" alt = "Логотип ШУ арены" class = "logo">
    </a>
    <h1 class = "simulation-title">
        Wave
    </h1>
    <button class = "simulation-settings-button" onclick = "onClickSimulationSettingsButton()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<div class="simulation-wrapper">
    <div class = "container" id = "simulation-content">
        <canvas id="canvas" class="canvas" ></canvas>
    </div>

    <aside class = "simulation-settings-panel container">

        <div class = "field">
            <label for = "startSpeed">Начальная скорость</label>
            <input type="number" id = "startSpeed" min="-10" max="10" step="1" value="0">
        </div>

        <div class = "field">
            <label for = "curveForm">
                Начальная форма кривой
            </label>
            <select id = "curveForm">
                <option value = "line"> Линия </option>
                <option value = "sin" selected> Синусоида </option>
                <option value = "smoothSquare"> Квадраты </option>
                <option value = "modulated"> Радио </option>
                <option value = "bell" > Колокол </option>
            </select>
        </div>

        <div class = settings-buttons>
            <div class = "settings-buttons-container">
                <button id = "start-reset" type = "button" class = "active">Stop</button>
            </div>
        </div>

    </aside>
</div>
</body>
</html>
