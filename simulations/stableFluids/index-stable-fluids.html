<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stable Fluids</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/simulations/simulation.css">
    <link rel="stylesheet" href="/stableFluids/stable-fluids-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="/simulations/simulation.js"></script>
    <script type="module" src="/stableFluids/app.js"></script>
</head>
<body>
<header id = "simulation-header">
    <a class = "main-page-link" href = "/main-page/index.html">
        <img src = "/assets/logo.png" alt = "Логотип ШУ арены" class = "logo">
    </a>
    <h1 class = "simulation-title">
        Stable Fluids
    </h1>
    <button class = "simulation-settings-button" onclick = "onClickSimulationSettingsButton()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<div class="simulation-wrapper">
    <div class = "container" id = "simulation-content">
        <canvas id="view"></canvas>
    </div>

    <aside class = "simulation-settings-panel container">
        <div class="field">
            <label for="vorticity-slider">Завихренность: <span id="vorticity-value">0.0</span></label>
            <input type="range" id="vorticity-slider" min="0" max="20" value="0" step="0.1">
        </div>

        <div class="field">
            <label for="viscosity-slider">Вязкость: <span id="viscosity-value"></span></label>
            <input type="number" id="viscosity-slider" min="0" max="2.0" value="0" step="0.01">
        </div>

        <div class = "settings-buttons">
            <div class="settings-buttons-container">
                <button id="reset-button" type="button" class = "active">Перезапустить</button>
            </div>
        </div>
    </aside>
</div>
</body>
</html>
