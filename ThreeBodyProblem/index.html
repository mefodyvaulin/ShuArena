<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="container">
        <section class="settings">
            Настройки
            <label>
                G:
                <input id="input-g" type="number" min="0.01" max="100" step="0.1">
            </label>

            <label>
                Временной шаг (dt):
                <input id="input-dt" type="number" min="0.0001" max="100" step="0.01">
            </label>

            <label>
                Скорость времени:
                <input id="input-timeSpeed" type="number" min="0.1" max="100" step="1">
            </label>

            Конфигурация 1-го тела
            <div class="firstBodyConfig" id="firstBodyConfig">
                <label>
                    Масса:
                    <input id="input-firstBodyMass" type="number" min="0.1" max="100" step="0.1">
                </label>
                <label>
                    Положение по X:
                    <input id="input-firstBodyPositionX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Положение по Y:
                    <input id="input-firstBodyPositionY" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по X:
                    <input id="input-firstBodyVelocityX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по Y:
                    <input id="input-firstBodyVelocityY" type="number" min="-100" max="100" step="1">
                </label>
            </div>

            Конфигурация 2-го тела
            <div class="secondBodyConfig" id="secondBodyConfig">
                <label>
                    Масса:
                    <input id="input-secondBodyMass" type="number" min="0.1" max="100" step="0.1">
                </label>
                <label>
                    Положение по X:
                    <input id="input-secondBodyPositionX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Положение по Y:
                    <input id="input-secondBodyPositionY" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по X:
                    <input id="input-secondBodyVelocityX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по Y:
                    <input id="input-secondBodyVelocityY" type="number" min="-100" max="100" step="1">
                </label>
            </div>

            Конфигурация 3-го тела
            <div class="thirdBodyConfig" id="thirdBodyConfig">
                <label>
                    Масса:
                    <input id="input-thirdBodyMass" type="number" min="0.1" max="100" step="0.1">
                </label>
                <label>
                    Положение по X:
                    <input id="input-thirdBodyPositionX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Положение по Y:
                    <input id="input-thirdBodyPositionY" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по X:
                    <input id="input-thirdBodyVelocityX" type="number" min="-100" max="100" step="1">
                </label>
                <label>
                    Скорость по Y:
                    <input id="input-thirdBodyVelocityY" type="number" min="-100" max="100" step="1">
                </label>
            </div>

            <label>
                Граница поля
                <input id="field-borders" type="checkbox">
            </label>

            <button id="pause-button">Пауза</button>

            <button id="continue-button">Возобновить</button>

            <button id="reset-button">Перезагрузить</button>
        </section>
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
